name: Build — Injection Nav

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'css/nav.css'
      - 'templates/nav.html'
      - '**/index.html'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lancer le build
        run: node build.js

      - name: Commiter les pages générées
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "build: injection nav [auto]"
          git push